<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Upload media to Kingstone, a five-piece reggae group.">
  <title>Uploads | Kingstone Official</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://googleapis.com" rel="stylesheet">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <style>
    .upload-frame-wrapper {
      position: relative;
      width: 100%;
      max-width: 850px;
      margin: 20px auto 40px auto;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      overflow: hidden;
      background: #ffffff;
    }
    .upload-iframe {
      width: 100%;
      /* 
        Uses Viewport Height (vh). 
        Calculates screen height minus header/nav, 
        ensuring the full upload interface fits cleanly on one screen view.
      */
      height: 75vh; 
      min-height: 550px; /* Safe minimum height for tiny phone screens */
      max-height: 900px; /* Prevents extreme stretching on massive monitors */
      border: none;
      display: block;
    }

    /* Clean fallback hint text */
    .upload-hint {
      text-align: center;
      font-size: 0.9rem;
      color: #666;
      margin-top: 15px;
    }
  </style>
</head>
<body>

<header>
  <img src="images/banner.jpg" alt="Kingstone Reggae" class="banner"/>
  <div class="contact-info-placeholder"></div> 
</header>

<nav class="nav-placeholder"></nav> 

<div class="container">
  <h2>Upload Media</h2>
  <p>Share your photos and videos directly with us below. Files go straight to our cloud.</p>
  
  <div class="upload-frame-wrapper">
    <iframe 
      src="https://nubbo.app" 
      class="upload-iframe"
      scrolling="yes"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
      allowfullscreen>
    </iframe>
  </div>

  <p class="upload-hint">Having trouble with the view? You can also <a href="https://nubbo.app" target="_blank" style="color: #d9534f; font-weight: bold;">click here</a> to open the portal fullscreen.</p>
</div>

<script src="shared.js"></script>
</body>
</html>
